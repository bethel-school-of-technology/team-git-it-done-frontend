<ion-header>
  <ion-toolbar color="secondary">
    <ion-title class="ion-text-center">Edit Bill</ion-title>
  </ion-toolbar>
</ion-header>

<!-- <ion-content class="ion-padding ion-text-center"> -->
  <ion-content class="background-image">

    <div class="content-wrapper">


  <ion-card class="ion-margin-auto" style="max-width: 500px;">
    <ion-card-header>
      <ion-card-title>Edit Bill Details</ion-card-title>
    </ion-card-header>

   

    <ion-card-content>
      <form (ngSubmit)="editBill()" #editBillForm="ngForm">

        <ion-item>
          <ion-label position="floating">Name</ion-label>
          <ion-input type="text" id="name" name="name" [(ngModel)]="updateBill.name" required></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Description</ion-label>
          <ion-input type="text" id="description" name="description" [(ngModel)]="updateBill.description"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Price (Dollars)</ion-label>
          <ion-input type="number" id="price" name="price" [(ngModel)]="updateBill.price" required></ion-input>
        </ion-item>

        <ion-button expand="block" type="submit" [disabled]="editBillForm.invalid" class="ion-margin-top">
          Save Changes
        </ion-button>

        <ion-button expand="block" color="medium" (click)="cancel()" class="ion-margin-top">
          Cancel
        </ion-button>

      </form>
    </ion-card-content>

  </ion-card>
</div>

</ion-content>
