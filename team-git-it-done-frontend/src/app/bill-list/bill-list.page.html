
<ion-header>
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
  </ion-buttons>
    <ion-title>List of Bills</ion-title>
  </ion-toolbar>
</ion-header>


<div *ngFor = "let bill of listofBills">
  <p>{{bill.billId}}. 
    <a routerLink= "/bill-list/{{bill.billId}}">
      {{bill.name}} {{bill.description}} {{bill.price}}
    </a></p>

    <p>list here</p>
    <ion-button 
    onclick = "deleteBill(bill.billId)">Delete Bill
  </ion-button>

  <!-- <ion-button>
    <ion-icon slot="icon-only" routerLink="/bill-list/bill-create" md="settings-sharp">+</ion-icon>
  </ion-button> -->

  

</div>
