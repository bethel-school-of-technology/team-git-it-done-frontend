<ion-header>
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title class="ion-text-center">List of Bills</ion-title>
  </ion-toolbar>
</ion-header>

<!-- <ion-content class="ion-padding"> -->
  <ion-content class="ion-padding page-background"> 
  <div *ngFor="let bill of listOfBills">
    <ion-item>
      <ion-label>
        <h2>{{ bill.name }}</h2>
        <p>
          ${{ bill.price }} of which you owe:
          <ng-container *ngIf="bill.billId != null && billToOwed[bill.billId] !== undefined; else loading">
            ${{ billToOwed[bill.billId] }}
          </ng-container>
          <ng-template #loading>Loading...</ng-template>
        </p>
        <p>{{ bill.description }}</p>
      </ion-label>
    </ion-item>

    <ion-item lines="none">
      <ion-button expand="full" color="danger" (click)="deleteBill(bill.billId ?? 0)">
        Delete
      </ion-button>
      <ion-button expand="full" (click)="navigateToEditBill(bill.billId ?? 0)">
        Edit
      </ion-button>
      <ion-button expand="full" color="success" (click)="settleBill(bill.billId ?? 0)">
        Settle
      </ion-button>
    </ion-item>

  

    <ion-item-divider>
      <ion-label> </ion-label>
    </ion-item-divider>

  </div>
</ion-content>
