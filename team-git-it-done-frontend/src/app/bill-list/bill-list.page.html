<ion-header>
 
</ion-header>

<ion-content class="ion-padding page-background">
  <div *ngFor="let bill of listOfBills">
    <ion-card class="ion-no-margin" color="light">
      <ion-card-header>
        <ion-card-title>{{bill.name}}</ion-card-title>
        <ion-card-subtitle>
          ${{bill.price}} of which you owe:
          <ng-container
            *ngIf="bill.billId != null && billToOwed[bill.billId] !== undefined; else loading"
          >
            ${{ billToOwed[bill.billId]?.toFixed(2) }}
          </ng-container>
          <ng-template #loading> Loading... </ng-template>
        </ion-card-subtitle>
      </ion-card-header>

      <ion-card-content> {{bill.description}} </ion-card-content>

      <ion-button (click)="deleteBill(bill.billId ?? 0)" color="danger">Delete</ion-button>
      <ion-button (click)="navigateToEditBill(bill.billId ?? 0)">Edit</ion-button>
      <ion-button (click)="openSettleModal(bill.billId ?? 0)" color="success">Settle</ion-button>
      <ion-button
        target="_blank"
        
        [href]="`https://paypal.me/PatrickBackes75/${bill.billId != null ? billToOwed[bill.billId]?.toFixed(2) : ''}`"
      >Paypal</ion-button>
    </ion-card>
    
  </div>

  <ion-modal #modal (willDismiss)="onWillDismiss($event)">
    <ng-template>
      <ion-header>
        <ion-toolbar>
          <ion-buttons slot="start">
            <ion-button (click)="cancel()">Cancel</ion-button>
          </ion-buttons>
          <ion-title>Settle Bill</ion-title>
          <ion-buttons slot="end">
            <ion-button (click)="confirm()" strong="true">Confirm</ion-button>
          </ion-buttons>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding">
        <ion-item>
          <ion-input
            label="Enter amount"
            labelPlacement="stacked"
            type="number"
            placeholder="Amount"
            [(ngModel)]="settleAmount"
          ></ion-input>
        </ion-item>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
