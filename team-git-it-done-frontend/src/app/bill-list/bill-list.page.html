
<ion-header>
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
  </ion-buttons>
    <ion-title class="ion-text-center">List of Bills</ion-title>
  </ion-toolbar>
</ion-header>

<!-- <ion-content class="background-image"> -->
  <ion-content class="ion-padding page-background">
<div *ngFor = "let bill of listOfBills">
  <ion-card class="ion-no-margin" color="light">

    <ion-card-header>
      <ion-card-title>{{bill.name}}</ion-card-title>
      <ion-card-subtitle>
        ${{bill.price}} 
        of which you owe: 
        <ng-container *ngIf="bill.billId != null && billToOwed[bill.billId] !== undefined; else loading">
          ${{ billToOwed[bill.billId]?.toFixed(2) }}
        </ng-container>
        <ng-template #loading>
          Loading...
        </ng-template>
      </ion-card-subtitle>
    </ion-card-header>
  
    <ion-card-content>
      {{bill.description}}
    </ion-card-content>

    <ion-button (click)="deleteBill(bill.billId ?? 0)" color="danger">Delete</ion-button>
    <ion-button (click)="navigateToEditBill(bill.billId ?? 0)">Edit</ion-button>
    <ion-button (click)="settleBill(bill.billId ?? 0)" color="success">Settle</ion-button>
  </ion-card>

</div>
</ion-content>
