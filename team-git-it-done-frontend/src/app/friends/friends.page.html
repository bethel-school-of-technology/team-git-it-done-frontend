<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>friends</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content >
  <ion-header collapse="condense">
  </ion-header>

  <ion-list>

    <ion-item *ngFor="let fren of friendsList">

      <ion-avatar slot="start">
        <img alt="Silhouette of a person's head" [src]="fren.pfp" />
      </ion-avatar>

        <ion-label>{{fren.mockUserName}}
          
        </ion-label>
    </ion-item>
</ion-list>


</ion-content>
