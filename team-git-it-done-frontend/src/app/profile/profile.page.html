<ion-content>
<div>
  <ion-button class="logout" size="small" float-right (click)="logout()">Log Out</ion-button>
</div>
  <div class="profile-header">
    <ion-item>
      <ion-label>Select Profile Picture</ion-label>
      <input type="file" accept="image/*" (change)="onFile($event)" />
    </ion-item>
    <ion-avatar slot="start">
      <img [src]="img" alt="Profile Picture" />
    </ion-avatar>
    <h1>{{ fullName }}</h1>
  </div>

  <ion-segment class="custom-segment">
    <ion-segment-button class="custom-segment" routerLink="/profile/bill-list">
      Bill List
    </ion-segment-button>

    <ion-segment-button class="custom-segment" routerLink="/profile/bill-create"
      >Create Bill</ion-segment-button
    >

    <ion-segment-button class="custom-segment" routerLink="/profile/friends">
      Friends
    </ion-segment-button>
  </ion-segment>
  <router-outlet></router-outlet>
</ion-content>
