<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>sign-in</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">sign-in</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-item>
    <ion-input label="Email" placeholder="Enter Email" [(ngModel)] ="email" ></ion-input>
  </ion-item>

  <ion-item>
    <ion-input label="Password" placeholder="Enter Password"  [(ngModel)] ="password" ></ion-input>
  </ion-item>

  <ion-button color="tertiary" (click)="signin()">Confirm</ion-button>

  <ion-button routerLink="sign-up">Sign Up</ion-button>

</ion-content>
