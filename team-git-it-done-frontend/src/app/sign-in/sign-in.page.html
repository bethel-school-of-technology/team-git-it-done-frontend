<ion-content [fullscreen]="true" class="background">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">sign-in</ion-title>
    </ion-toolbar>
  </ion-header>     

  <ion-card>
    <ion-card-content>
    <ion-img
    src="assets/1.png" style="width:15%"
    ></ion-img>
    <ion-text color="light">
      <h2><i>FairShare</i></h2>
    </ion-text>
  <ion-item color="rgb(51, 36, 46, 0.8)">
    <ion-input placeholder="Email" [(ngModel)] ="email" ></ion-input>
  </ion-item>
  <ion-item color="rgb(51, 36, 46, 0.8)">
      <ion-input placeholder="Password"  [(ngModel)] ="password" ></ion-input>
  </ion-item>
  <div style="display: flex; justify-content: center;">
    <ion-button class="first" (click)="signin()">Login</ion-button>
  
    <ion-button class="second" (click)="navigateToSignUp()">Sign Up</ion-button>
  </div>
</ion-card-content>
<div style="text-align: center; margin-top: 15px;">
  <ion-label class="center" style="font-weight: bold; font-size: 1.2em; color: #ffffff;">Verse of the day:</ion-label>
  <ion-label style="display: block; margin-top: 5px; font-style: italic; color: #dcdcdc;">{{randomVerse}}</ion-label>
</div>
</ion-card>

</ion-content>
